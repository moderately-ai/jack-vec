name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NIGHTLY: nightly-2026-05-03

jobs:
  stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - name: Test stable features and all targets
        run: cargo +stable test --all-targets --features serde,malloc_size_of,const_new
      - name: Check core-only no_std configuration
        run: cargo +stable check --lib --no-default-features
      - name: Check no_std feature interactions
        run: cargo +stable check --lib --no-default-features --features serde,malloc_size_of,const_new
      - name: Check formatting
        run: cargo +stable fmt --all -- --check
      - name: Run Clippy with warnings denied
        run: cargo +stable clippy --all-targets --features serde,malloc_size_of,const_new -- -D warnings
      - name: Build documentation with warnings denied
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo +stable doc --no-deps --features serde,malloc_size_of,const_new
      - name: Test benchmark tooling
        run: python3 tools/test_bench_ab.py
      - name: Test comparison harness
        run: cargo +stable test -p jack-vec-comparisons
      - name: Check comparison benchmark targets
        run: cargo +stable check -p jack-vec-comparisons --all-targets
      - name: Lint comparison harness
        run: cargo +stable clippy -p jack-vec-comparisons --all-targets -- -D warnings
      - name: Test comparison reporting tools
        run: uv run --project comparisons/tools --locked python -m unittest discover -s comparisons/tools -p 'test_*.py'
      - name: Validate versioned physical-host pair
        if: hashFiles('comparisons/benchmark-results/macos-aarch64.json') != '' && hashFiles('comparisons/benchmark-results/linux-x86_64.json') != ''
        run: uv run --project comparisons/tools --locked python comparisons/tools/validate_pair.py comparisons/benchmark-results/macos-aarch64.json comparisons/benchmark-results/linux-x86_64.json
      - name: Regenerate versioned benchmark graphics
        if: hashFiles('comparisons/benchmark-results/linux-x86_64.json') != ''
        run: |
          uv run --project comparisons/tools --locked python comparisons/tools/generate_report.py comparisons/benchmark-results/linux-x86_64.json
          git diff --exit-code -- comparisons/benchmark-results/LATEST.md comparisons/benchmark-results/graphics

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.86
        run: rustup toolchain install 1.86 --profile minimal
      - name: Check all targets on the MSRV
        run: cargo +1.86 check --all-targets --features serde,malloc_size_of,const_new
      - name: Check no_std feature interactions on the MSRV
        run: cargo +1.86 check --lib --no-default-features --features serde,malloc_size_of,const_new
      - name: Check comparison harness on the MSRV
        run: cargo +1.86 check -p jack-vec-comparisons --all-targets

  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly
        run: rustup toolchain install "$NIGHTLY" --profile minimal
      - name: Test unstable feature
        run: cargo +"$NIGHTLY" test --features unstable

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Miri
        run: rustup toolchain install "$NIGHTLY" --profile minimal --component miri
      - name: Set up Miri
        run: cargo +"$NIGHTLY" miri setup
      - name: Test with strict provenance and Tree Borrows
        env:
          MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-tree-borrows
        run: cargo +"$NIGHTLY" miri test
